<!doctype html>
<html lang="en">
  <head>
    <!--
      FBST client (Vite + React)

      Notes:
      1) The Google Identity Services script is required for the Google Sign-In button.
         Your React code will call `google.accounts.id.initialize(...)` and receive a JWT `credential`.
      2) The Client ID is NOT hardcoded here. Put it in `client/.env.local` as:
           VITE_GOOGLE_CLIENT_ID="your-client-id"
         Then read it in React via `import.meta.env.VITE_GOOGLE_CLIENT_ID`.
    -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0f1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#e4e9f0" media="(prefers-color-scheme: light)" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>The Fantastic Leagues</title>

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Google Identity Services (GIS) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
